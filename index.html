<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Julien Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#e8b800;--dark:#1a1a2e;--sky:#5c94fc;--mid:#16213e;
      --deep:#0f3460;--red:#e83c3c;--green:#22c45a;
      --cell:64px;--sb:270px;
    }
    html,body{height:100%;overflow:hidden;
      font-family:'Press Start 2P',monospace;
      background:var(--sky);color:#fff;
      user-select:none;-webkit-user-select:none;touch-action:none}

    /* ── LAYOUT ── */
    #wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    #top{background:var(--dark);border-bottom:4px solid var(--gold);
      padding:8px 14px;display:flex;align-items:center;
      justify-content:space-between;flex-shrink:0;gap:8px}
    #top h1{color:var(--gold);font-size:clamp(7px,1.8vw,14px);
      text-shadow:2px 2px 0 #c84c0c;white-space:nowrap}
    .hbtns{display:flex;gap:8px}
    #body{flex:1;display:flex;overflow:hidden}

    /* ── SIDEBAR ── */
    #sidebar{
      width:var(--sb);min-width:var(--sb);
      background:var(--dark);border-right:4px solid var(--gold);
      overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
      scrollbar-width:thin;scrollbar-color:var(--gold) var(--deep)}
    #sidebar::-webkit-scrollbar{width:5px}
    #sidebar::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
    #sidebar::-webkit-scrollbar-track{background:var(--deep)}
    .sg{border-bottom:2px solid rgba(232,184,0,.18)}
    .sg-hdr{background:var(--mid);padding:11px 12px;font-size:12px;color:var(--gold);
      letter-spacing:1px;cursor:pointer;
      display:flex;align-items:center;justify-content:space-between}
    .sg-hdr:hover{background:#1e2d4e}
    .sg-hdr .arr{transition:transform .2s;font-size:14px;line-height:1}
    .sg.closed .sg-hdr .arr{transform:rotate(-90deg)}
    .sg-items{display:flex;flex-direction:column;gap:4px;padding:7px 9px}
    .sg.closed .sg-items{display:none}
    .ib{
      display:flex;flex-direction:row;align-items:center;
      gap:12px;padding:10px 12px;
      background:var(--deep);border:2px solid #0c2a52;border-radius:7px;
      cursor:pointer;transition:transform .1s,border-color .1s,background .1s,box-shadow .1s}
    .ib:hover{background:#1a4a80;transform:translateX(3px)}
    .ib.sel{border-color:var(--gold);background:#1e5a90;box-shadow:0 0 9px rgba(232,184,0,.5)}
    .ib-ico{font-size:34px;line-height:1;flex-shrink:0;width:40px;text-align:center}
    .ib-lbl{font-size:14px;color:#ffffff;text-align:left;
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
      text-shadow:0 1px 4px rgba(0,0,0,.9);flex:1;letter-spacing:.3px}
    .ib-w{font-size:11px;color:#e8b800;flex-shrink:0;font-weight:bold}

    /* ── EDITOR ── */
    #ed{flex:1;overflow:auto;padding:14px 14px 52px;
      scrollbar-width:thin;scrollbar-color:var(--gold) #2a4a8a}
    #ed::-webkit-scrollbar{height:7px;width:7px}
    #ed::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
    #ed::-webkit-scrollbar-track{background:#2a4a8a}

    #grid{
      display:grid;
      grid-template-columns:repeat(50,var(--cell));
      grid-template-rows:repeat(12,var(--cell));
      position:relative;
      border:4px solid #0a0a1a;
      box-shadow:0 8px 40px rgba(0,0,0,.65);
      cursor:crosshair;flex-shrink:0}
    #grid.mode-eraser{cursor:cell}
    #grid.mode-move{cursor:grab}
    #grid.mode-move.dragging{cursor:grabbing}

    .cell{
      width:var(--cell);height:var(--cell);
      border:1px solid rgba(0,0,0,.11);
      background:var(--sky);
      position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      font-size:calc(var(--cell) + 18px);line-height:1;
      padding-bottom:8px}
    .cell[data-row="9"]{background:#6aa0f8}
    .cell[data-row="10"]{background:#7a5820}
    .cell[data-row="11"]{background:#6a4810}
    .cell.occ{background:rgba(100,160,255,.08)!important}
    .cell.hov{outline:3px solid rgba(255,255,255,.82);outline-offset:-3px;z-index:3}

    /* EMOJI SPAN for multi-cell */
    .espan{
      position:absolute;top:0;left:0;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;z-index:6;line-height:1;
      overflow:hidden;}

    /* Animations */
    @keyframes pop{
      0%{transform:scale(1.6) rotate(-6deg)}
      55%{transform:scale(.82) rotate(2deg)}
      100%{transform:scale(1) rotate(0)}
    }
    @keyframes era{0%{transform:scale(1);opacity:1}100%{transform:scale(0);opacity:0}}
    .ap{animation:pop .22s cubic-bezier(.36,.07,.19,.97)}
    .ae{animation:era .15s ease-out}

    /* ── QUICKTOOLS ── */
    #quicktools{
      background:var(--mid);border-bottom:3px solid rgba(232,184,0,.3);
      padding:5px 10px;display:flex;gap:8px;align-items:center;flex-shrink:0}
    #quicktools span{font-size:9px;color:#5577aa;letter-spacing:1px}
    .qt{
      display:flex;align-items:center;gap:7px;
      background:var(--deep);border:2px solid #1a3a60;border-radius:8px;
      padding:7px 14px;cursor:pointer;
      font-size:11px;color:#b0c8e8;
      transition:border-color .15s,background .15s,transform .1s;white-space:nowrap}
    .qt .qt-ico{font-size:26px;line-height:1}
    .qt:hover{background:#1a4a80;transform:translateY(-1px)}
    .qt.sel{border-color:var(--gold);background:#1e5a90;
      box-shadow:0 0 10px rgba(232,184,0,.45);color:#fff}
    #ghost{
      position:fixed;pointer-events:none;z-index:2000;
      display:none;align-items:center;justify-content:center;
      line-height:1;opacity:.42;background:none;transition:none}

    /* ── QUICKTOOLS ── */
    #quicktools{
      background:var(--mid);border-bottom:3px solid rgba(232,184,0,.3);
      padding:6px 12px;display:flex;gap:10px;align-items:center;flex-shrink:0}
    #quicktools>span{font-size:9px;color:#4466aa;letter-spacing:1px}
    .qt{
      display:flex;align-items:center;gap:8px;
      background:var(--deep);border:2px solid #1a3a60;border-radius:8px;
      padding:8px 16px;cursor:pointer;
      font-size:11px;color:#b0c8e8;
      transition:border-color .15s,background .15s,transform .1s;white-space:nowrap;
      font-family:'Press Start 2P',monospace}
    .qt .qt-ico{font-size:22px;line-height:1}
    .qt:hover{background:#1a4a80;transform:translateY(-1px)}
    .qt.sel{border-color:var(--gold);background:#1e5a90;
      box-shadow:0 0 10px rgba(232,184,0,.45);color:#fff}
    #grid.mode-erase{cursor:cell}
    #grid.mode-move{cursor:grab}
    #grid.mode-move.dragging{cursor:grabbing}

    /* ── FLOATING GHOST ── */
    .btn{background:var(--gold);color:var(--dark);border:3px solid #c88000;
      padding:7px 12px;font-family:'Press Start 2P',monospace;
      font-size:clamp(5px,1vw,8px);cursor:pointer;border-radius:4px;
      box-shadow:0 4px 0 #7a4e00;transition:transform .1s,box-shadow .1s,background .1s;
      white-space:nowrap}
    .btn:hover{background:#ffd020;transform:translateY(-1px)}
    .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #7a4e00}
    .btn.danger{background:var(--red);border-color:#b02020;color:#fff;box-shadow:0 4px 0 #701010}
    .btn.danger:hover{background:#ff5555}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* ── BUTTONS ── */
    #infobar{
      position:fixed;bottom:0;left:var(--sb);right:0;
      background:var(--dark);border-top:3px solid var(--gold);
      padding:5px 14px;display:flex;align-items:center;
      justify-content:space-between;font-size:clamp(5px,.9vw,7px);
      color:#7898c8;z-index:200;flex-wrap:wrap;gap:4px}
    #infobar .hl{color:var(--gold)}

    /* ── TOAST ── */
    #toast{
      position:fixed;top:80px;left:50%;
      transform:translateX(-50%) translateY(-22px);
      background:var(--dark);border:3px solid var(--gold);
      color:var(--gold);font-size:8px;padding:10px 18px;
      border-radius:6px;opacity:0;pointer-events:none;
      transition:opacity .2s,transform .2s;z-index:900;
      white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── MODE HISTOIRE ── */
    #btn-story{background:#7c3aed;border-color:#5b21b6;color:#fff;box-shadow:0 4px 0 #3b0764}
    #btn-story:hover{background:#8b5cf6}
    #btn-story.active{background:#059669;border-color:#047857;box-shadow:0 4px 0 #064e3b}

    #story-modal{
      display:none;position:fixed;inset:0;z-index:3000;
      background:rgba(0,0,0,.82);align-items:center;justify-content:center;}
    #story-modal.open{display:flex;}
    #story-box{
      background:#1a1a2e;border:4px solid #e8b800;border-radius:12px;
      padding:24px;max-width:640px;width:90%;max-height:85vh;overflow-y:auto;
      scrollbar-width:thin;scrollbar-color:#e8b800 #0f3460}
    #story-box h2{color:#e8b800;font-size:12px;margin-bottom:16px;text-align:center;letter-spacing:1px}
    .story-card{
      display:flex;align-items:center;gap:12px;
      background:#0f3460;border:2px solid #1a3a60;border-radius:8px;
      padding:12px 14px;margin-bottom:8px;cursor:pointer;
      transition:border-color .15s,background .15s}
    .story-card:hover{background:#1a4a80;border-color:#e8b800}
    .story-card .sc-num{font-size:20px;color:#e8b800;flex-shrink:0;width:32px;text-align:center}
    .story-card .sc-title{font-size:11px;color:#fff;flex:1}
    .story-card .sc-items{font-size:9px;color:#7898c8;margin-top:4px}
    #story-close{
      display:block;margin:16px auto 0;background:#e83c3c;border-color:#b02020;
      color:#fff;box-shadow:0 4px 0 #701010}

    #story-hud{
      display:none;background:#0f3460;border-bottom:3px solid #7c3aed;
      padding:8px 14px;flex-shrink:0;gap:10px;align-items:flex-start;flex-wrap:wrap}
    #story-hud.visible{display:flex;}
    #story-hud .sh-title{color:#e8b800;font-size:10px;letter-spacing:1px;flex-shrink:0}
    #story-hud .sh-text{color:#b0c8e8;font-size:9px;line-height:1.7;flex:1;min-width:200px}
    #story-items-track{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .st-item{
      display:flex;align-items:center;gap:5px;
      background:#1a3a60;border:2px solid #2a5090;border-radius:6px;
      padding:4px 8px;font-size:9px;color:#7898c8;transition:all .2s}
    .st-item.done{border-color:#22c45a;background:#0a3a20;color:#22c45a}
    .st-item .st-ico{font-size:16px}

    #win-screen{
      display:none;position:fixed;inset:0;z-index:4000;
      background:rgba(0,0,0,.88);align-items:center;justify-content:center;flex-direction:column;gap:20px}
    #win-screen.open{display:flex;}
    #win-screen .ws-emoji{font-size:80px;animation:pop .4s cubic-bezier(.36,.07,.19,.97)}
    #win-screen h2{color:#e8b800;font-size:16px;text-align:center;text-shadow:3px 3px 0 #c88000}
    #win-screen p{color:#b0c8e8;font-size:9px;text-align:center;line-height:2;max-width:340px}
    .ws-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  </style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <h1>✨ JULIEN STORY</h1>
    <div class="hbtns">
      <button class="btn" id="btn-story">📖 HISTOIRES</button>
      <button class="btn" id="btn-undo" disabled>↩ ANNULER</button>
      <button class="btn danger" id="btn-clear">🗑 EFFACER</button>
    </div>
  </div>
  <div id="story-hud">
    <div style="flex:1">
      <div class="sh-title" id="sh-title"></div>
      <div class="sh-text" id="sh-text"></div>
    </div>
    <div id="story-items-track"></div>
    <button class="btn danger" id="btn-quit-story" style="flex-shrink:0;align-self:center">✖ QUITTER</button>
  </div>
  <div id="quicktools">
    <span>OUTILS</span>
    <div class="qt sel" id="qt-draw"><span class="qt-ico">&#x270F;&#xFE0F;</span>DESSINER</div>
    <div class="qt" id="qt-erase"><span class="qt-ico">&#x1F9F9;</span>GOMME</div>
    <div class="qt" id="qt-move"><span class="qt-ico">&#x270B;</span>D&#xC9;PLACER</div>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="ed"><div id="grid"></div></div>
  </div>
</div>

<div id="ghost"></div>
<div id="infobar">
  <div>BLOC&#160;: <span class="hl" id="info-sel">—</span></div>
  <div>ITEMS&#160;: <span class="hl" id="info-cnt">0</span></div>
  <div>✏️ GLISSE POUR DESSINER !</div>
</div>
<div id="toast"></div>

<!-- ── MODAL CHOIX HISTOIRE ── -->
<div id="story-modal">
  <div id="story-box">
    <h2>📖 CHOISIS TON HISTOIRE</h2>
    <div id="story-list"></div>
    <button class="btn" id="story-close">✖ FERMER</button>
  </div>
</div>

<!-- ── ÉCRAN DE VICTOIRE ── -->
<div id="win-screen">
  <div class="ws-emoji">🏆</div>
  <h2>BRAVO ! HISTOIRE TERMINÉE !</h2>
  <p id="win-text"></p>
  <div class="ws-btns">
    <button class="btn" id="win-next">➡ HISTOIRE SUIVANTE</button>
    <button class="btn" id="win-replay">🔄 REJOUER</button>
    <button class="btn danger" id="win-free">🎨 MODE LIBRE</button>
  </div>
</div>

<script>
const CELL_PX = 64, COLS = 50, ROWS = 12, MIN_MS = 55;

/* ── HISTOIRES / DÉFIS ── */
const STORIES = [
  {
    id:1, title:'Le Lapin Perdu et le Ruisseau Magique',
    emoji:'🐰',
    text:'Le lapin veut rejoindre sa grand-mère, mais le pont est cassé ! Aide-le à traverser le ruisseau en posant tous les bons éléments.',
    required:['rabbit','broke-bridge','river','rock','branch','house']
  },
  {
    id:2, title:"L'Astronaute et la Fusée en Panne",
    emoji:'👽',
    text:"L'alien est à court d'énergie sur une planète sombre. Répare la fusée et reparts dans les étoiles !",
    required:['alien','breakdown','cloud','gear','crystal','star']
  },
  {
    id:3, title:'Le Pirate et le Trésor de la Tempête',
    emoji:'🏴‍☠️',
    text:"Une tempête a tout cassé et le coffre est fermé à clé. Aide le pirate à récupérer son trésor et fêter ça avec ses amis !",
    required:['pirate','storm','locked-chest','plank','key','chest','friends']
  },
  {
    id:4, title:"Le Dragon et l'Incendie de la Forêt",
    emoji:'🐉',
    text:"Un incendie menace la forêt ! Le dragon doit trouver de l'eau et sauver tous les animaux.",

  },
  {
    id:5, title:'Le Pompier Courageux et la Route Bloquée',
    emoji:'🧑‍🚒',
    text:"Un arbre bloque la route et il n'y a plus d'eau. Le pompier doit tout dégager et éteindre le feu !",
    required:['fireman','tree','blocked-road','no-water','plank','tap-water','house']
  },
  {
    id:6, title:'Le Dinosaure Piégé dans le Trou',
    emoji:'🦕',
    text:"Le dinosaure est tombé dans un grand trou ! Aide-le à attraper une liane et pousser les rochers pour s'en sortir.",
    required:['dino','hole','rock','vine','friends']
  },
  {
    id:7, title:'La Voiture Magique dans la Tempête',
    emoji:'✨',
    text:"La voiture magique fonce vers la fête mais une tempête et un rocher bloquent la route. Utilise la magie !",
    required:['tree','storm','rock','magic','plank','friends']
  },
  {
    id:8, title:'Le Requin et le Grand Filet',
    emoji:'🦈',
    text:"Le petit requin est coincé dans un filet attaché à des rochers. Ses amis ont un cristal pour le libérer !",

  },
  {
    id:9, title:"La Princesse et l'Arc-en-Ciel Gris",
    emoji:'👸',

  },
  {
    id:10, title:"Le Grand Gâteau Magique de l'Enfant",
    emoji:'🧒',
    text:"L'enfant veut un gros gâteau pour ses amis mais il manque tout ! Brave la pluie, trouve les ingrédients et prépare la fête.",
    required:['child','storm','ingredient','magic','tree','gift','friends']
  }
];

const W = {
  castle:4, house:4,
  bridge:3, rainbow:3, 'broke-bridge':3,
  tree:2, rock:2,
  dragon:2, dino:2, shark:2, fireman:2, pirate:2,
  child:2, rabbit:2, alien:2, princess:2, friends:2,

const H = {
  castle:2, house:2,
  tree:2, rainbow:2,
  dragon:2, dino:2, fireman:2,
  storm:2,

const iw = id => W[id] || 1;
const ih = id => H[id] || 1;

const GROUPS = [
  { label:'ENVIRONNEMENT', items:[
    {id:'grass-g',  lbl:'Herbe',       ico:'\u{1F7E9}', freq:320},
    {id:'sand',     lbl:'Sable',       ico:'\u{1F7E8}', freq:340},

    {id:'snow',     lbl:'Neige',       ico:'\u2B1C',    freq:520},

    {id:'tap-water',  lbl:'Eau / tuyau', ico:'\u{1F6BF}', freq:360},
    {id:'vine',       lbl:'Liane',       ico:'\u{1F331}', freq:340},

    {id:'hammer',     lbl:'Marteau',     ico:'\u{1F528}', freq:250},
    {id:'rope',       lbl:'Corde',       ico:'\u{1FAA2}', freq:280},
    {id:'shovel',     lbl:'Pelle',       ico:'\u26CF\uFE0F', freq:230},
  ]},

    {id:'dragon',   lbl:'Dragon',    ico:'\u{1F409}', freq:320},

  ]},
  { label:'OUTIL', items:[

  ]},
];

const ALL = GROUPS.flatMap(g => g.items);
const byId = id => ALL.find(x => x.id === id);

/* ── AUDIO ── */
let _ac=null;
function getAC(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();return _ac;
}
function beep(freq){
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);
  const t=c.currentTime;
  o.type=freq>700?'sine':'square';
  o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*1.5,t+0.07);
  g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.start(t);o.stop(t+0.14);}catch(_){}
}

/* ── STATE ── */
let sel=ALL[0],drawing=false,lastKey=null,lastT=0,undoStack=[];
let mode='draw'; // 'draw' | 'erase' | 'move'
let movePickup=null;
const cells=[];

/* ── SIDEBAR ── */
const sb=document.getElementById('sidebar');
GROUPS.forEach(g=>{
  const sg=document.createElement('div');sg.className='sg';
  const hdr=document.createElement('div');hdr.className='sg-hdr';
  hdr.innerHTML=g.label+'<span class="arr">&#9660;</span>';
  hdr.onclick=()=>sg.classList.toggle('closed');
  const it=document.createElement('div');it.className='sg-items';
  g.items.forEach(item=>{
    const w=iw(item.id);
    const h=ih(item.id);
    const btn=document.createElement('button');
    btn.className='ib'+(item===sel?' sel':'');
    btn.dataset.id=item.id;
    btn.innerHTML='<span class="ib-ico">'+item.ico+'</span>'+
      '<span class="ib-lbl">'+item.lbl+'</span>'+
      (w>1||h>1?'<span class="ib-w">'+w+'x'+h+' cases</span>':'');
    btn.addEventListener('pointerdown',e=>{e.preventDefault();pick(item);});
    it.appendChild(btn);
  });
  sg.appendChild(hdr);sg.appendChild(it);sb.appendChild(sg);
});
function pick(item){
  sel=item;
  document.querySelectorAll('.ib').forEach(b=>b.classList.remove('sel'));
  const b=document.querySelector('.ib[data-id="'+item.id+'"]');
  if(b){b.classList.add('sel');}
  updateInfo();
}

/* ── GRID ── */
const gridEl=document.getElementById('grid');
for(let r=0;r<ROWS;r++){cells[r]=[];for(let c=0;c<COLS;c++){
  const el=document.createElement('div');
  el.className='cell';el.dataset.row=r;el.dataset.col=c;
  el.addEventListener('mouseenter',()=>{if(!drawing)hover(r,c);});
  gridEl.appendChild(el);cells[r][c]=el;
}}
gridEl.addEventListener('mouseleave',clearHov);

/* ── HOVER / GHOST ── */
const ghost=document.getElementById('ghost');
function clearHov(){
  document.querySelectorAll('.cell.hov').forEach(c=>c.classList.remove('hov'));
  if(!movePickup) ghost.style.display='none';
}
function hover(r,c){
  clearHov();
  if(mode==='erase'){cells[r][c].classList.add('hov');return;}
  if(mode==='move') return; // curseur géré par CSS, pas de hov qui masque les items
  const w=iw(sel.id),h=ih(sel.id);
  for(let dr=0;dr<h&&r+dr<ROWS;dr++)
    for(let dc=0;dc<w&&c+dc<COLS;dc++)
      cells[r+dr][c+dc].classList.add('hov');
  const rect=cells[r][c].getBoundingClientRect();
  const ew=w*CELL_PX, eh=h*CELL_PX;
  const fs=(w===1&&h===1)?(CELL_PX+18):Math.round(Math.min(ew*0.72, eh*0.88));
  ghost.style.cssText='display:flex;left:'+rect.left+'px;top:'+rect.top+'px;'+
    'width:'+ew+'px;height:'+eh+'px;font-size:'+fs+'px;line-height:1;overflow:hidden;';
  ghost.textContent=sel.ico;
}

/* ── PLACED ITEMS (source of vérité) ── */
let placed=[]; // [{id,r,c,w,h}] dans l'ordre de pose, le dernier = au-dessus

function itemsAt(r,c){
  return placed.filter(p=>r>=p.r&&r<p.r+(p.h||1)&&c>=p.c&&c<p.c+(p.w||1));
}

/* ── RENDER ALL ── */
function renderAll(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=cells[r][c];
    el.innerHTML='';el.textContent='';
    el.removeAttribute('style');el.classList.remove('occ');
  }
  gridEl.querySelectorAll('.espan').forEach(e=>e.remove());
  placed.forEach((p,idx)=>{
    const itm=byId(p.id);if(!itm)return;
    const w=p.w||1,h=p.h||1;
    // Décalage de pile : combien d'items avec exactement le même ancre avant celui-ci
    const stackIdx=placed.slice(0,idx).filter(x=>x.r===p.r&&x.c===p.c).length;
    const off=stackIdx*6;
    if(w===1&&h===1){
      const el=cells[p.r][p.c];
      el.style.overflow='hidden';el.style.position='relative';
      const sp=document.createElement('span');
      sp.style.cssText='position:absolute;font-size:calc(var(--cell) * 0.75);line-height:1;'+
        'left:calc(50% + '+off+'px);top:calc(50% + '+off+'px);'+
        'transform:translate(-50%,-50%);z-index:'+(stackIdx+2)+';'+
        'display:flex;align-items:center;justify-content:center;'+
        'filter:drop-shadow(-1px -1px 3px rgba(0,0,0,.7))';
      sp.textContent=itm.ico;
      el.appendChild(sp);
    }else{
      const ew=w*CELL_PX,eh=h*CELL_PX;
      const fs=Math.round(Math.min(ew*0.72,eh*0.88));
      const sp=document.createElement('div');
      sp.className='espan';
      sp.style.width=ew+'px';sp.style.height=eh+'px';
      sp.style.left=(p.c*CELL_PX+off)+'px';
      sp.style.top=(p.r*CELL_PX+off)+'px';
      sp.style.fontSize=fs+'px';
      sp.style.zIndex=String(stackIdx+2);
      sp.style.filter='drop-shadow(-1px -1px 3px rgba(0,0,0,.7))';
      sp.textContent=itm.ico;
      gridEl.appendChild(sp);
    }
  });
}

/* ── UNDO ── */
function dcopy(){return placed.map(p=>Object.assign({},p));}
function saveU(){undoStack.push(dcopy());if(undoStack.length>80)undoStack.shift();document.getElementById('btn-undo').disabled=false;}

/* ── PLACE / ERASE ── */
function eraseAt(r,c){
  const covering=itemsAt(r,c);
  if(!covering.length)return;
  const top=covering[covering.length-1];
  placed=placed.filter(p=>p!==top);
  renderAll();
  anim(cells[top.r][top.c],true);
  updCnt();
}
function placeAt(r,c){
  const now=Date.now();if(now-lastT<MIN_MS)return;
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  if(mode==='erase'){if(itemsAt(r,c).length){eraseAt(r,c);lastT=now;}return;}
  if(mode==='move')return;
  const w=iw(sel.id),h=ih(sel.id);
  if(c+w>COLS||r+h>ROWS)return;
  // Max 3 items par ancre exacte (même r,c)
  const sameAnchor=placed.filter(p=>p.r===r&&p.c===c);
  if(sameAnchor.length>=3)return;
  // Skip si le même item est déjà tout en haut à ce même ancre
  if(sameAnchor.length>0&&sameAnchor[sameAnchor.length-1].id===sel.id)return;
  placed.push({id:sel.id,r,c,w,h});
  renderAll();
  anim(cells[r][c],false);
  beep(sel.freq||300);
  lastT=now;updCnt();
}
function anim(el,er){
  el.classList.remove('ap','ae');void el.offsetWidth;
  el.classList.add(er?'ae':'ap');
  setTimeout(()=>el.classList.remove('ap','ae'),300);
}
function pos(e){
  let x,y;
  if(e.touches&&e.touches.length>0){x=e.touches[0].clientX;y=e.touches[0].clientY;}
  else if(e.changedTouches&&e.changedTouches.length>0){x=e.changedTouches[0].clientX;y=e.changedTouches[0].clientY;}
  else{x=e.clientX;y=e.clientY;}
  // Traverser tous les éléments pour passer au-dessus des espans
  const els=document.elementsFromPoint(x,y);
  for(const t of els){
    if(t&&t.dataset&&t.dataset.row!==undefined)
      return{r:+t.dataset.row,c:+t.dataset.col};
  }
  return null;
}

/* ── MOVE TOOL ── */
function movePickupAt(r,c){
  const covering=itemsAt(r,c);
  if(!covering.length)return;
  const top=covering[covering.length-1];
  movePickup=Object.assign({},top);
  // Ne pas retirer de placed : l'item reste visible pendant le drag
  const itm=byId(top.id);
  if(itm){
    const rect=cells[top.r][top.c].getBoundingClientRect();
    const ew=(top.w||1)*CELL_PX,eh=(top.h||1)*CELL_PX;
    const fs=((top.w||1)===1&&(top.h||1)===1)?(CELL_PX+18):Math.round(Math.min(ew*0.72,eh*0.88));
    ghost.style.cssText='display:flex;left:'+rect.left+'px;top:'+rect.top+'px;'+
      'width:'+ew+'px;height:'+eh+'px;font-size:'+fs+'px;line-height:1;opacity:.7;overflow:hidden;';
    ghost.textContent=itm.ico;
  }
  gridEl.classList.add('dragging');
}
function moveGhostTo(e){
  if(!movePickup)return;
  let x,y;
  if(e.touches&&e.touches.length>0){x=e.touches[0].clientX;y=e.touches[0].clientY;}
  else{x=e.clientX;y=e.clientY;}
  const ew=(movePickup.w||1)*CELL_PX,eh=(movePickup.h||1)*CELL_PX;
  ghost.style.left=(x-ew/2)+'px';
  ghost.style.top=(y-eh/2)+'px';
}
function moveDropAt(e){
  if(!movePickup)return;
  let x,y;
  if(e.changedTouches&&e.changedTouches.length){x=e.changedTouches[0].clientX;y=e.changedTouches[0].clientY;}
  else{x=e.clientX;y=e.clientY;}
  // Traverser pour passer au-dessus des espans
  const mw=movePickup.w||1,mh=movePickup.h||1;
  let p=null;
  const els=document.elementsFromPoint(x,y);
  for(const t of els){
    if(t&&t.dataset&&t.dataset.row!==undefined){
      p={r:+t.dataset.row,c:+t.dataset.col};break;
    }
  }
  const dest=(p&&p.c+mw<=COLS&&p.r+mh<=ROWS)?p:{r:movePickup.r,c:movePickup.c};
  // Retirer la dernière occurrence de l'original, puis poser à la destination
  const idx=placed.map((x,i)=>x.r===movePickup.r&&x.c===movePickup.c&&x.id===movePickup.id&&(x.w||1)===mw&&(x.h||1)===mh?i:-1).filter(i=>i>=0).pop();
  if(idx!==undefined)placed.splice(idx,1);
  placed.push({id:movePickup.id,r:dest.r,c:dest.c,w:mw,h:mh});
  renderAll();
  anim(cells[dest.r][dest.c],false);
  beep(byId(movePickup.id)?.freq||300);
  updCnt();
  movePickup=null;ghost.style.display='none';
  gridEl.classList.remove('dragging');
}

/* ── EVENTS ── */
gridEl.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(mode==='move'){const p=pos(e);if(p){saveU();movePickupAt(p.r,p.c);}return;}
  drawing=true;lastKey=null;saveU();
  const p=pos(e);if(p){placeAt(p.r,p.c);lastKey=p.r+','+p.c;}
});
document.addEventListener('mousemove',e=>{
  if(movePickup){moveGhostTo(e);return;}
  if(!drawing)return;
  const p=pos(e);if(!p)return;
  const k=p.r+','+p.c;if(k!==lastKey){placeAt(p.r,p.c);lastKey=k;}
});
document.addEventListener('mouseup',e=>{
  if(movePickup){moveDropAt(e);return;}
  drawing=false;lastKey=null;
});
gridEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(mode==='move'){const p=pos(e);if(p){saveU();movePickupAt(p.r,p.c);}return;}
  drawing=true;lastKey=null;saveU();
  const p=pos(e);if(p){placeAt(p.r,p.c);lastKey=p.r+','+p.c;}
},{passive:false});
gridEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(movePickup){moveGhostTo(e);return;}
  if(!drawing)return;
  const p=pos(e);if(!p)return;
  const k=p.r+','+p.c;if(k!==lastKey){placeAt(p.r,p.c);lastKey=k;}
},{passive:false});
gridEl.addEventListener('touchend',e=>{
  if(movePickup){moveDropAt(e);return;}
  drawing=false;lastKey=null;
});

/* ── BUTTONS ── */
document.getElementById('btn-undo').addEventListener('click',()=>{
  if(!undoStack.length)return;
  placed=undoStack.pop();
  renderAll();
  updCnt();
  if(!undoStack.length)document.getElementById('btn-undo').disabled=true;
  toast('↩ ANNULÉ !');
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm('Effacer tout le niveau ?'))return;
  saveU();
  placed=[];
  renderAll();
  updCnt();toast('🗑 EFFACÉ !');
});

/* ── UI ── */
function updCnt(){
  document.getElementById('info-cnt').textContent=placed.length;
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.qt').forEach(b=>b.classList.remove('sel'));
  document.getElementById('qt-'+m).classList.add('sel');
  gridEl.className='mode-'+m;
  clearHov();updateInfo();
}
document.getElementById('qt-draw').addEventListener('click',()=>setMode('draw'));
document.getElementById('qt-erase').addEventListener('click',()=>setMode('erase'));
document.getElementById('qt-move').addEventListener('click',()=>setMode('move'));

function updateInfo(){
  if(!sel)return;
  const labels={draw:'DESSINER',erase:'GOMME',move:'DÉPLACER'};
  const w=iw(sel.id);
  const hh=ih(sel.id);
  if(mode==='draw') document.getElementById('info-sel').textContent=sel.ico+' '+sel.lbl+(w>1||hh>1?' ('+w+'x'+hh+')':'');
  else document.getElementById('info-sel').textContent=labels[mode];
}
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),1600);
}

updateInfo();

/* ── MODE HISTOIRE ── */
let currentStory = null;

const storyList = document.getElementById('story-list');
STORIES.forEach(s => {
  const itemLabels = s.required.map(id => { const it=byId(id); return it?it.ico:''; }).join(' ');
  const card = document.createElement('div');
  card.className = 'story-card';
  card.innerHTML = '<div class="sc-num">'+s.emoji+'</div>'+
    '<div><div class="sc-title">'+s.id+'. '+s.title+'</div>'+
    '<div class="sc-items">'+itemLabels+'</div></div>';
  card.addEventListener('click', () => startStory(s));
  storyList.appendChild(card);
});

document.getElementById('btn-story').addEventListener('click', () => {
  document.getElementById('story-modal').classList.add('open');
});
document.getElementById('story-close').addEventListener('click', () => {
  document.getElementById('story-modal').classList.remove('open');
});

function startStory(s) {
  document.getElementById('story-modal').classList.remove('open');
  currentStory = s;
  placed = []; renderAll(); updCnt();
  document.getElementById('sh-title').textContent = s.emoji + ' ' + s.title;
  document.getElementById('sh-text').textContent = s.text;
  document.getElementById('story-hud').classList.add('visible');
  document.getElementById('btn-story').classList.add('active');
  document.getElementById('btn-story').textContent = '📖 ' + s.id + '/10';
  renderStoryTrack();
  toast('🎯 DÉFI ' + s.id + ' LANCÉ !');
}

function renderStoryTrack() {
  if (!currentStory) return;
  const track = document.getElementById('story-items-track');
  track.innerHTML = '';
  const placedIds = new Set(placed.map(p => p.id));
  currentStory.required.forEach(id => {
    const itm = byId(id); if (!itm) return;
    const done = placedIds.has(id);
    const div = document.createElement('div');
    div.className = 'st-item' + (done ? ' done' : '');
    div.innerHTML = '<span class="st-ico">' + itm.ico + '</span>' + itm.lbl;
    track.appendChild(div);
  });
}

function checkStoryWin() {
  if (!currentStory) return;
  const placedIds = new Set(placed.map(p => p.id));
  const allDone = currentStory.required.every(id => placedIds.has(id));
  if (allDone) {
    setTimeout(() => {
      document.getElementById('win-text').textContent =
        'Tu as posé tous les éléments de "' + currentStory.title + '" ! 🎉';
      document.getElementById('win-screen').classList.add('open');
      beep(880); setTimeout(()=>beep(1100),150); setTimeout(()=>beep(1320),300);
    }, 400);
  }
}

function stopStory() {
  currentStory = null;
  document.getElementById('story-hud').classList.remove('visible');
  document.getElementById('btn-story').classList.remove('active');
  document.getElementById('btn-story').textContent = '📖 HISTOIRES';
}

document.getElementById('win-replay').addEventListener('click', () => {
  document.getElementById('win-screen').classList.remove('open');
  const s = currentStory; if (s) startStory(s);
});
document.getElementById('win-next').addEventListener('click', () => {
  document.getElementById('win-screen').classList.remove('open');
  const nextIdx = STORIES.findIndex(s => s === currentStory) + 1;
  if (nextIdx < STORIES.length) startStory(STORIES[nextIdx]);
  else { stopStory(); toast('🏆 TOUTES LES HISTOIRES TERMINÉES !'); }
});
document.getElementById('win-free').addEventListener('click', () => {
  document.getElementById('win-screen').classList.remove('open');
  stopStory(); placed = []; renderAll(); updCnt();
  toast('🎨 MODE LIBRE !');
});
document.getElementById('btn-quit-story').addEventListener('click', () => {
  stopStory();
  toast('🎨 MODE LIBRE !');
});

const _origRenderAll = renderAll;
renderAll = function() {
  _origRenderAll();
  if (currentStory) { renderStoryTrack(); checkStoryWin(); }
};
</script>
